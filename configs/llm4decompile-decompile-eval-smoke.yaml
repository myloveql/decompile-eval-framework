workspace_root: ../../..

# HumanEval 与 MBPP 分开配置，使 limit 分别作用于两个 split。
datasets:
  - id: decompile-eval-humaneval
    type: decompile_eval
    path: data/decompile-eval
    splits: [humaneval]
    assembly_view: asm
    evaluation_protocol:
      type: decompile_eval_exitcode
    languages: [c]
    optimizations: [O0, O1, O2, O3]
    limit: 10
    timeout: 30

  - id: decompile-eval-mbpp
    type: decompile_eval
    path: data/decompile-eval
    splits: [mbpp]
    assembly_view: asm
    evaluation_protocol:
      type: decompile_eval_exitcode
    languages: [c]
    optimizations: [O0, O1, O2, O3]
    limit: 10
    timeout: 30

decompilers:
  - id: llm4decompile-1.3b-v1.6
    type: python
    version: llm4decompile-1.3b-v1.6
    plugin: plugins.llm4decompile_backend:LLM4DecompileBackend
    batch_size: 1
    plugin_config:
      model_path: models/llm4decompile-1.3b-v1.6
      device: cuda
      max_input_tokens: 14000
      max_new_tokens: 2048
      do_sample: false

postprocessors: [markdown_fence]
metrics: [recompilable, behavioral_pass]

executor:
  type: local
  require_linux: true
  memory_mb: 4096
  max_file_mb: 64

preflight:
  mode: strict

output:
  root: runs
  cache: .cache/decomp-eval
