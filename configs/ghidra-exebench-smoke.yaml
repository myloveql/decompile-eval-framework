workspace_root: ../../..

datasets:
  - id: exebench-1100
    type: exebench_flat
    path: data/exebench/1641-Benchmark/exebench_1641_source_multiopt_1100.dataset.json
    include_path: third_party/exebench/exebench
    assembly_view: objdump_att_instruction_only
    evaluation_protocol:
      type: exebench_json_io
    optimizations: [O0]
    limit: 1
    timeout: 30

decompilers:
  - id: ghidra-11.0.3
    type: ghidra
    ghidra_path: code/LLM4Decompile/ghidra/ghidra_11.0.3_PUBLIC
    timeout: 300
    analysis_timeout: 120
    verify_binary_hash: true

postprocessors: [markdown_fence, ghidra_compat_types]
metrics: [recompilable, behavioral_pass]

executor:
  type: local
  require_linux: true
  memory_mb: 4096
  max_file_mb: 64

preflight:
  mode: strict

output:
  root: runs
  cache: .cache/decomp-eval
