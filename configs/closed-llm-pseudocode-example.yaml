workspace_root: ../../..

datasets:
  - id: exebench-1100
    type: exebench_flat
    path: data/exebench/1641-Benchmark/exebench_1641_source_multiopt_1100.with-ghidra.dataset.json
    include_path: third_party/exebench/exebench
    assembly_view: objdump_att_instruction_only
    pseudocode_view: ghidra
    evaluation_protocol:
      type: exebench_json_io
    optimizations: [O0]
    limit: 1
    timeout: 30

decompilers:
  - id: closed-llm-pseudocode
    type: openai
    provider: openai
    model: your-model-name
    api_key_env: OPENAI_API_KEY
    api_mode: responses

    # 可改为 [assembly] 或 [assembly, pseudocode]。
    required_inputs: [pseudocode]

    temperature: 0
    max_output_tokens: 4096
    timeout: 120
    max_retries: 3
    max_concurrency: 2
    batch_size: 4

postprocessors: [markdown_fence]
metrics: [recompilable, behavioral_pass]

executor:
  type: local
  require_linux: true
  memory_mb: 4096
  max_file_mb: 64

preflight:
  mode: strict

output:
  root: runs
  cache: .cache/decomp-eval
